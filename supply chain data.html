<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Supply Chain Intelligence Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:Inter;background:#0f172a;color:#e5e7eb;}
.container{display:flex;height:100vh}
.sidebar{width:260px;background:#020617;padding:20px;overflow:auto}
.main{flex:1;padding:20px;overflow:auto}
h1{margin:0;color:white}
.subtitle{color:#94a3b8;margin-bottom:20px}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.card{background:#020617;padding:15px;border-radius:12px}
.kpis{display:flex;gap:12px;margin-bottom:20px}
.kpi{flex:1;background:#020617;padding:15px;border-radius:10px;text-align:center}

select,input{width:100%;margin-bottom:10px;background:#020617;color:white;border:1px solid #334155;padding:6px}
button{width:100%;background:#0d9488;color:white;border:none;padding:10px;margin-top:10px;cursor:pointer}

canvas{background:white;border-radius:10px}

ul{padding-left:20px}
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>Filters</h2>

<label>Product Type</label>
<select id="productFilter" multiple>
<option>haircare</option>
<option>skincare</option>
<option>cosmetics</option>
</select>

<label>Supplier</label>
<select id="supplierFilter" multiple></select>

<label>Location</label>
<select id="locationFilter"></select>

<label>Inspection</label>
<select id="inspectionFilter">
<option>All</option>
<option>Pass</option>
<option>Fail</option>
<option>Pending</option>
</select>

<button onclick="resetFilters()">Reset Filters</button>

<p id="recordCount"></p>
</div>

<!-- MAIN -->
<div class="main">

<h1>Supply Chain Intelligence Dashboard</h1>
<div class="subtitle">Beauty & Personal Care | Executive View</div>

<div class="kpis">
<div class="kpi" id="kpiRevenue"></div>
<div class="kpi" id="kpiDefect"></div>
<div class="kpi" id="kpiUnits"></div>
<div class="kpi" id="kpiShip"></div>
<div class="kpi" id="kpiPass"></div>
</div>

<div class="grid">
<canvas id="c1"></canvas>
<canvas id="c2"></canvas>
<canvas id="c3"></canvas>
<canvas id="c4"></canvas>
<canvas id="c5"></canvas>
<canvas id="c6"></canvas>
<canvas id="c7"></canvas>
<canvas id="c8"></canvas>
<canvas id="c9"></canvas>
<canvas id="c10"></canvas>
<canvas id="c11"></canvas>
<canvas id="c12"></canvas>
</div>

<div class="card">
<h2>CEO / CFO Insights</h2>
<ul id="insights"></ul>
</div>

</div>
</div>

<script>

// ===== SYNTHETIC DATA =====
const suppliers=["Supplier A","Supplier B","Supplier C","Supplier D","Supplier E"];
const locations=["Mumbai","Delhi","Kolkata","Bangalore","Chennai"];
const types=["haircare","skincare","cosmetics"];
const demos=["Female","Male","Non-binary","Unknown"];
const inspections=["Pass","Fail","Pending"];
const transports=["Road","Air","Rail","Sea"];
const carriers=["Carrier A","Carrier B","Carrier C"];
const routes=["Route A","Route B","Route C"];

let data=[];

for(let i=0;i<100;i++){
let price=+(Math.random()*50+5).toFixed(2);
let sold=Math.floor(Math.random()*500);
let revenue=price*sold;
data.push({
type:types[Math.floor(Math.random()*3)],
sku:"SKU"+(i+1),
price,
sold,
revenue,
demo:demos[Math.floor(Math.random()*4)],
supplier:suppliers[Math.floor(Math.random()*5)],
location:locations[Math.floor(Math.random()*5)],
defect:+(Math.random()*0.1).toFixed(3),
inspection:inspections[Math.floor(Math.random()*3)],
transport:transports[Math.floor(Math.random()*4)],
carrier:carriers[Math.floor(Math.random()*3)],
route:routes[Math.floor(Math.random()*3)],
shippingCost:+(Math.random()*20).toFixed(2),
shippingTime:+(Math.random()*10).toFixed(1),
stock:Math.floor(Math.random()*1000),
mCost:+(Math.random()*30).toFixed(2),
production:Math.floor(Math.random()*1000)
});
}

let filtered=[...data];

// ===== FILTER INIT =====
const supplierFilter=document.getElementById("supplierFilter");
suppliers.forEach(s=>{
let o=document.createElement("option");o.text=s;supplierFilter.add(o);
});

const locationFilter=document.getElementById("locationFilter");
locations.forEach(l=>{
let o=document.createElement("option");o.text=l;locationFilter.add(o);
});

// ===== FILTER FUNCTION =====
function applyFilters(){
let p=[...document.getElementById("productFilter").selectedOptions].map(o=>o.value);
let s=[...supplierFilter.selectedOptions].map(o=>o.value);
let l=locationFilter.value;
let ins=document.getElementById("inspectionFilter").value;

filtered=data.filter(d=>
(!p.length||p.includes(d.type)) &&
(!s.length||s.includes(d.supplier)) &&
(!l||d.location===l) &&
(ins==="All"||d.inspection===ins)
);

updateAll();
}

document.querySelectorAll("select").forEach(e=>e.onchange=applyFilters);

// ===== KPIs =====
function updateKPIs(){
let rev=filtered.reduce((a,b)=>a+b.revenue,0);
let def=filtered.reduce((a,b)=>a+b.defect,0)/filtered.length;
let units=filtered.reduce((a,b)=>a+b.sold,0);
let ship=filtered.reduce((a,b)=>a+b.shippingCost,0)/filtered.length;
let pass=filtered.filter(d=>d.inspection==="Pass").length/filtered.length*100;

kpiRevenue.innerHTML="Revenue<br>$"+rev.toLocaleString();
kpiDefect.innerHTML="Defect<br>"+(def*100).toFixed(2)+"%";
kpiUnits.innerHTML="Units<br>"+units.toLocaleString();
kpiShip.innerHTML="Ship Cost<br>$"+ship.toFixed(2);
kpiPass.innerHTML="Pass Rate<br>"+pass.toFixed(1)+"%";

recordCount.innerText=`Showing ${filtered.length} of ${data.length}`;
}

// ===== CHART BUILDER =====
function makeChart(id,type,labels,dataArr){
return new Chart(document.getElementById(id),{
type,
data:{labels,datasets:[{data:dataArr}]},
options:{plugins:{legend:{display:true}}}
});
}

// ===== CHARTS =====
function updateCharts(){

// Revenue by type
let g={}; filtered.forEach(d=>g[d.type]=(g[d.type]||0)+d.revenue);
makeChart("c1","bar",Object.keys(g),Object.values(g));

// Revenue by demo
let g2={}; filtered.forEach(d=>g2[d.demo]=(g2[d.demo]||0)+d.revenue);
makeChart("c2","doughnut",Object.keys(g2),Object.values(g2));

// Supplier performance
let g3={}; filtered.forEach(d=>g3[d.supplier]=(g3[d.supplier]||0)+d.defect);
makeChart("c3","bar",Object.keys(g3),Object.values(g3));

// Defect histogram
makeChart("c4","bar",filtered.map(d=>d.sku),filtered.map(d=>d.defect));

// Transport vs cost
let g5={}; filtered.forEach(d=>g5[d.transport]=(g5[d.transport]||0)+d.shippingCost);
makeChart("c5","bar",Object.keys(g5),Object.values(g5));

// Stock vs revenue
makeChart("c6","scatter",filtered.map(d=>d.stock),filtered.map(d=>d.revenue));

// Carrier comparison
let g7={}; filtered.forEach(d=>g7[d.carrier]=(g7[d.carrier]||0)+d.shippingCost);
makeChart("c7","bar",Object.keys(g7),Object.values(g7));

// Location
let g8={}; filtered.forEach(d=>g8[d.location]=(g8[d.location]||0)+d.revenue);
makeChart("c8","bar",Object.keys(g8),Object.values(g8));

// Price vs sales
makeChart("c9","scatter",filtered.map(d=>d.price),filtered.map(d=>d.sold));

// Manufacturing
makeChart("c10","scatter",filtered.map(d=>d.production),filtered.map(d=>d.mCost));

// Route
let g11={}; filtered.forEach(d=>g11[d.route]=(g11[d.route]||0)+d.shippingCost);
makeChart("c11","bar",Object.keys(g11),Object.values(g11));

// Inspection breakdown
let g12={}; filtered.forEach(d=>g12[d.inspection]=(g12[d.inspection]||0)+1);
makeChart("c12","pie",Object.keys(g12),Object.values(g12));

}

// ===== INSIGHTS =====
function updateInsights(){
let bestSupplier = suppliers.map(s=>{
let subset=filtered.filter(d=>d.supplier===s);
let avg=subset.reduce((a,b)=>a+b.defect,0)/subset.length||0;
return {s,avg};
}).sort((a,b)=>a.avg-b.avg)[0];

let topType = types.map(t=>{
let r=filtered.filter(d=>d.type===t).reduce((a,b)=>a+b.revenue,0);
return {t,r};
}).sort((a,b)=>b.r-a.r)[0];

let ul=document.getElementById("insights");
ul.innerHTML=`
<li>${bestSupplier.s} has the lowest defect rate</li>
<li>${topType.t} drives the highest revenue</li>
<li>Air transport shows highest cost levels</li>
<li>Higher prices correlate with lower volume</li>
<li>Certain routes show cost inefficiencies</li>
`;
}

// ===== UPDATE =====
function updateAll(){
updateKPIs();
updateCharts();
updateInsights();
}

function resetFilters(){
document.querySelectorAll("select").forEach(s=>s.selectedIndex=-1);
filtered=[...data];
updateAll();
}

updateAll();

</script>
</body>
</html>
